<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div id="mainCard" class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-300">
        <div class="bg-red-700 p-6 text-white text-center border-b-4 border-red-800">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Frost Connect</h1>
            <p class="text-red-100 text-[10px] uppercase font-bold tracking-[0.2em] opacity-80">Fleet Maintenance Management</p>
        </div>

        <form id="uploadForm" class="p-6 space-y-5">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Asset Classification</label>
                <div class="flex gap-2">
                    <button type="button" id="btnVehicle" onclick="toggleAsset('vehicle')" class="flex-1 py-3 rounded-lg bg-red-700 text-white font-bold shadow-md transition-all text-sm uppercase">Vehicle</button>
                    <button type="button" id="btnTrailer" onclick="toggleAsset('trailer')" class="flex-1 py-3 rounded-lg bg-slate-200 text-slate-600 font-bold border border-slate-300 hover:bg-slate-300 transition-all text-sm uppercase">Trailer</button>
                </div>
                
                <button type="button" onclick="openDefectWindow('DEFECTS')" class="w-full mt-4 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-700 text-xs font-black uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center justify-center gap-2 shadow-sm">
                    Pull Defect Reports
                </button>
            </div>

            <div id="vehicleWrapper">
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Select Unit</label>
                <select id="vehicleSelect" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-600 outline-none text-sm font-medium">
                    <option value="">-- Select Vehicle Registration --</option>
                    <option value="BX15 JSU">BX15 JSU</option>
                    <option value="DK69 ZHM">DK69 ZHM</option>
                    <option value="FD65 VZA">FD65 VZA</option>
                    <option value="FJ17 OPT">FJ17 OPT</option>
                    <option value="FJ69 WMC">FJ69 WMC</option>
                    <option value="FJ69 WML">FJ69 WML</option>
                    <option value="FN21 HLZ">FN21 HLZ</option>
                    <option value="FR72 FTS">FR72 FTS</option>
                    <option value="FS72 FTS">FS72 FTS</option>
                    <option value="FT72 FTS">FT72 FTS</option>
                    <option value="HS19 YNH">HS19 YNH</option>
                    <option value="KU70 XNR">KU70 XNR</option>
                    <option value="KU70 XNS">KU70 XNS</option>
                    <option value="KU70 XNT">KU70 XNT</option>
                    <option value="KU70 XNV">KU70 XNV</option>
                    <option value="KU70 XNW">KU70 XNW</option>
                    <option value="KU70 XNX">KU70 XNX</option>
                </select>
            </div>

            <div id="trailerWrapper" class="hidden">
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Select Asset</label>
                <select id="trailerSelect" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-600 outline-none text-sm font-medium">
                    <option value="">-- Select Trailer Number --</option>
                    <option value="FTSTR01">FTSTR01</option>
                    <option value="FTSTR02">FTSTR02</option>
                    <option value="FTSTR03">FTSTR03</option>
                    <option value="FTSTR04">FTSTR04</option>
                    <option value="FTSTR05">FTSTR05</option>
                    <option value="FTSTR09">FTSTR09</option>
                    <option value="FTSTR11">FTSTR11</option>
                    <option value="FTSTR12">FTSTR12</option>
                    <option value="FTSTR17">FTSTR17</option>
                    <option value="FTSTR21">FTSTR21</option>
                    <option value="FTSTR22">FTSTR22</option>
                    <option value="FTSTR23">FTSTR23</option>
                    <option value="FTSTR24">FTSTR24</option>
                    <option value="FTSTR25">FTSTR25</option>
                    <option value="FTSTR26">FTSTR26</option>
                    <option value="FTSTR27">FTSTR27</option>
                    <option value="FTSTR28">FTSTR28</option>
                    <option value="FTSTR30">FTSTR30</option>
                    <option value="FTSTR31">FTSTR31</option>
                    <option value="FTSTR41">FTSTR41</option>
                    <option value="FTSTR42">FTSTR42</option>
                    <option value="FTSTR44">FTSTR44</option>
                    <option value="FTSTR45">FTSTR45</option>
                    <option value="FTSTR46">FTSTR46</option>
                    <option value="FTSTR60">FTSTR60</option>
                    <option value="FTSTR61">FTSTR61</option>
                    <option value="FTSTR62">FTSTR62</option>
                    <option value="FTSTR63">FTSTR63</option>
                    <option value="FTSTR64">FTSTR64</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Entry Type</label>
                <select id="docType" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-600 outline-none text-sm font-medium">
                    <option>Safety Inspection</option>
                    <option>MOT Certificate</option>
                    <option>Repair Invoice</option>
                    <option>Defect Sheet</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Source Files</label>
                <input type="file" id="fileInput" accept="application/pdf,image/*" multiple required
                    class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-[10px] file:font-black file:uppercase file:bg-slate-900 file:text-white hover:file:bg-slate-700 cursor:pointer border border-dashed border-slate-300 p-2 rounded-lg">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-4 bg-red-700 hover:bg-red-800 text-white font-black uppercase tracking-widest rounded-xl shadow-lg transition-all active:scale-[0.98]">
                confirm and upload records
            </button>

            <div id="statusMessage" class="hidden p-3 rounded-lg text-xs text-center font-bold uppercase tracking-wide"></div>
        </form>
    </div>

    <div id="defectWindow" class="fixed inset-0 bg-slate-100 z-50 hidden flex flex-col">
        <div class="bg-white border-b border-slate-300 p-4 shadow-sm">
            <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="bg-slate-900 p-2 rounded-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-black text-slate-900 uppercase tracking-tighter">Maintenance Audit Log</h2>
                        <p id="currentFilterLabel" class="text-[10px] font-bold uppercase tracking-widest text-slate-400">System Live</p>
                    </div>
                </div>

                <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                    <button id="toggleActive" onclick="fetchDefects('DEFECTS')" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all bg-white shadow-sm text-red-600">
                        Active
                    </button>
                    <button id="toggleHistory" onclick="fetchDefects('Resolved - Nil Defect')" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-slate-900">
                        Resolved
                    </button>
                </div>

                <button onclick="closeDefectWindow()" class="text-slate-400 hover:text-red-600 transition-colors">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

        <div id="defectContent" class="flex-1 overflow-y-auto bg-slate-50">
            <div class="max-w-4xl mx-auto p-4 md:p-8">
                <div id="defectLoading" class="text-center py-20 hidden">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-red-700 border-t-transparent"></div>
                </div>
                
                <div id="defectList" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mbudwnwxucluwgbkgbfx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeType = 'vehicle';

        function toggleAsset(type) {
            activeType = type;
            const vWrap = document.getElementById('vehicleWrapper'), tWrap = document.getElementById('trailerWrapper');
            const vBtn = document.getElementById('btnVehicle'), tBtn = document.getElementById('btnTrailer');
            if (type === 'vehicle') {
                vWrap.classList.remove('hidden'); tWrap.classList.add('hidden');
                vBtn.className = "flex-1 py-3 rounded-lg bg-red-700 text-white font-bold shadow-md transition-all text-sm uppercase";
                tBtn.className = "flex-1 py-3 rounded-lg bg-slate-200 text-slate-600 font-bold border border-slate-300 hover:bg-slate-300 transition-all text-sm uppercase";
            } else {
                tWrap.classList.remove('hidden'); vWrap.classList.add('hidden');
                tBtn.className = "flex-1 py-3 rounded-lg bg-red-700 text-white font-bold shadow-md transition-all text-sm uppercase";
                vBtn.className = "flex-1 py-3 rounded-lg bg-slate-200 text-slate-600 font-bold border border-slate-300 hover:bg-slate-300 transition-all text-sm uppercase";
            }
        }

        function openDefectWindow(status) {
            document.getElementById('defectWindow').classList.remove('hidden');
            fetchDefects(status);
        }

        function closeDefectWindow() {
            document.getElementById('defectWindow').classList.add('hidden');
        }

        async function fetchDefects(statusString) {
            const list = document.getElementById('defectList'), loader = document.getElementById('defectLoading');
            const label = document.getElementById('currentFilterLabel'), actBtn = document.getElementById('toggleActive'), hisBtn = document.getElementById('toggleHistory');

            list.innerHTML = ""; loader.classList.remove('hidden');

            const isActive = statusString === 'DEFECTS';
            label.innerText = isActive ? "Priority: High (Action Required)" : "Audit Log: Resolved Items";
            label.className = isActive ? "text-[10px] font-bold uppercase tracking-widest text-red-600" : "text-[10px] font-bold uppercase tracking-widest text-green-600";
            
            actBtn.className = isActive ? "px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest bg-white shadow-sm text-red-600" : "px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest text-slate-400";
            hisBtn.className = !isActive ? "px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest bg-white shadow-sm text-green-600" : "px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest text-slate-400";

            try {
                const [v, t] = await Promise.all([
                    _supabase.from('daily_vehicle_checks').select('*').eq('condition_status', statusString).order('created_at', { ascending: false }),
                    _supabase.from('daily_trailer_checks').select('*').eq('condition_status', statusString).order('created_at', { ascending: false })
                ]);

                let all = [...(v.data || []), ...(t.data || [])].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                if (all.length === 0) {
                    list.innerHTML = `<div class='text-center py-20 border-2 border-dashed border-slate-300 rounded-2xl'><p class='text-slate-400 font-bold uppercase text-xs tracking-widest'>No records match current filter</p></div>`;
                } else {
                    all.forEach(item => {
                        const date = new Date(item.created_at).toLocaleDateString('en-GB');
                        const id = item.registration || item.trailer_number || '---';
                        const div = document.createElement('div');
                        
                        div.className = "flex items-stretch bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow";
                        div.innerHTML = `
                            <div class="w-2 ${isActive ? 'bg-red-600' : 'bg-green-500'}"></div>
                            <div class="flex-1 p-4 grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                                <div>
                                    <span class="block text-[9px] font-black text-slate-400 uppercase tracking-widest">Asset ID</span>
                                    <span class="text-sm font-black text-slate-900 tracking-wider">${id}</span>
                                </div>
                                <div class="md:col-span-2 border-l border-slate-100 pl-4">
                                    <span class="block text-[9px] font-black text-slate-400 uppercase tracking-widest">Defect Summary</span>
                                    <span class="text-xs font-bold text-slate-700 italic">"${item.defect_details || 'No detail'}"</span>
                                </div>
                                <div class="text-right flex flex-col items-end border-l border-slate-100 pl-4">
                                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Reported By</span>
                                    <span class="text-xs font-bold text-slate-900">${item.driver_name || 'System'}</span>
                                    <span class="text-[10px] font-bold text-slate-400 mt-1">${date}</span>
                                </div>
                            </div>
                            <div class="p-4 flex items-center bg-slate-50 border-l border-slate-100">
                                <div class="h-2 w-2 rounded-full ${isActive ? 'bg-red-600 animate-pulse' : 'bg-green-500'}"></div>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                }
            } catch (err) {
                list.innerHTML = `<p class='text-red-500 font-bold'>Audit Error: ${err.message}</p>`;
            } finally { loader.classList.add('hidden'); }
        }

        // UPLOAD LOGIC
        const form = document.getElementById('uploadForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'), msg = document.getElementById('statusMessage');
            const files = document.getElementById('fileInput').files;
            const reg = activeType === 'vehicle' ? document.getElementById('vehicleSelect').value : document.getElementById('trailerSelect').value;
            if (!reg) return alert("Select Asset");

            btn.disabled = true; btn.innerText = "Synchronizing...";
            try {
                for (let i = 0; i < files.length; i++) {
                    const f = files[i];
                    const path = `${activeType === 'vehicle' ? 'Vehicles' : 'Trailers'}/${reg.replace(/\s+/g, '')}/${document.getElementById('docType').value.replace(/\s+/g, '')}/${Date.now()}_${i}.${f.name.split('.').pop()}`;
                    await _supabase.storage.from('maintenance_docs').upload(path, f);
                    await _supabase.from('maintenance_records').insert([{ vehicle_reg: reg, document_type: document.getElementById('docType').value, file_path: path }]);
                }
                msg.innerText = "Cloud Sync Complete"; msg.className = "p-3 rounded-lg text-xs text-center bg-slate-900 text-white block mt-4";
                form.reset();
            } catch (err) {
                msg.innerText = err.message; msg.className = "p-3 rounded-lg text-xs text-center bg-red-100 text-red-700 block mt-4";
            } finally { btn.disabled = false; btn.innerText = "confirm and upload records"; }
        });
    </script>
</body>
</html>
